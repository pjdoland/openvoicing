name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build the libraries, then the app under /openvoicing/app/. The promo
      # site (site/index.html) is the Pages root; the app lives one level down.
      - run: pnpm -r build
      - run: OPENVOICING_BASE=/openvoicing/app/ pnpm --filter @openvoicing/web build
      # Compile the promo site's Tailwind CSS.
      - run: pnpm build:site
      - name: Assemble Pages site (promo at root, app under /app/)
        run: |
          rm -rf _site
          mkdir -p _site/app
          cp -R apps/web/dist/. _site/app/
          cp site/index.html _site/index.html
          cp site/style.css _site/style.css
          cp site/*.png _site/
          cp -R site/fonts _site/fonts
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
