name: a11y

on:
  pull_request:
  push:
    branches: [main]

jobs:
  axe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # playwright + @axe-core/playwright are devDependencies; just fetch the browser.
      - run: pnpm --filter @openvoicing/web exec playwright install --with-deps chromium
      - name: Serve and scan
        run: |
          pnpm --filter @openvoicing/web exec vite preview --port 4173 &
          npx wait-on http://localhost:4173
          node apps/web/scripts/a11y-check.mjs http://localhost:4173
