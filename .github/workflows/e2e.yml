name: e2e

on:
  pull_request:
  push:
    branches: [main]

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @openvoicing/web exec playwright install --with-deps chromium
      - name: Run end-to-end tests
        run: pnpm --filter @openvoicing/web e2e
        env:
          CI: "true"
