name: Feature request
description: Suggest an improvement or a new capability.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: Describe the goal or the pain point, not just a solution.
      placeholder: As a <musician / self-hoster / contributor>, I want to ... so that ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      placeholder: A way to ...
    validations:
      required: true
  - type: dropdown
    id: audience
    attributes:
      label: Who is this mainly for?
      options:
        - Musicians using the app
        - People self-hosting or embedding
        - Contributors / developers
        - Not sure
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or workarounds
      description: Anything you have tried, or how you do this today.
